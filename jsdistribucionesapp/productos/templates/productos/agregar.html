{% extends "base.html" %}



{% block content %}

    <div class="flex justify-center mt-12">
  <div class="w-full max-w-md bg-[#E2DACF] border border-[#CFC6B8] rounded-2xl shadow-lg p-8">

    <h1 class="text-3xl font-semibold text-center mb-8">
      Agregar producto
    </h1>

    <form action="{{ url_for('productos.agregar') }}" method="post" class="flex flex-col gap-6">

      <!-- Nombre -->
      <div class="flex flex-col gap-2">
        <label class="text-lg font-medium">
          Nombre del producto
        </label>
        <input
          type="text"
          name="nombre"
          required
          class="px-4 py-3 rounded-lg border border-[#CFC6B8]
                 text-lg focus:outline-none focus:ring-2
                 focus:ring-[#C9A24D]"
        >
      </div>

      <!-- Departamento -->
      <div class="flex flex-col gap-2">
        <label class="text-lg font-medium">Departamento</label>
        <select
          name="departamento"
          required
          class="px-4 py-3 rounded-lg border border-[#CFC6B8]
                 text-lg bg-white
                 focus:outline-none focus:ring-2
                 focus:ring-[#C9A24D]">

          <option value="">Seleccionar…</option>
          <option value="yerba">Yerba</option>
          <option value="infusiones">Infusiones</option>
          <option value="almacen">Almacén</option>
          <option value="bebidas">Bebidas</option>
          <option value="limpieza">Limpieza</option>

        </select>
      </div>

      <!-- Precio -->
      <div class="flex flex-col gap-2">
        <label class="text-lg font-medium">
          Precio
        </label>
        <input
          type="number"
          name="precio"
          step="0.01"
          required
          class="px-4 py-3 rounded-lg border border-[#CFC6B8]
                 text-lg focus:outline-none focus:ring-2
                 focus:ring-[#C9A24D]"
        >
      </div>

      <!-- Stock -->
      <div class="flex flex-col gap-2">
        <label class="text-lg font-medium">
          Stock
        </label>
        <input
          type="number"
          name="stock"
          class="px-4 py-3 rounded-lg border border-[#CFC6B8]
                 text-lg focus:outline-none focus:ring-2
                 focus:ring-[#C9A24D]"
        >
      </div>

      <div class="flex items-center gap-2 mt-4">
        <input
          type="checkbox"
          name="activo"
          id="activo"
          class="rounded border-gray-300"
          checked
        >
        <label for="activo" class="text-sm font-semibold">
          Producto activo
        </label>
      </div>


      <!-- Botón -->
      <input
        type="submit"
        value="Agregar producto"
        class="mt-4 bg-[#C9A24D] hover:bg-[#A8862D]
               text-white text-xl font-semibold
               py-4 rounded-xl
               cursor-pointer
               transition shadow-md"
      >

    </form>
  </div>
</div>


{% endblock %}
