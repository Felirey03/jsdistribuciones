{% extends "base.html" %}

{% block content %}


<div class="max-w-3xl mx-auto mt-10">

  <!-- Título -->
  <h1 class="text-2xl font-bold text-[#1F1F1F] mb-6">
    Agregar cliente
  </h1>

  <!-- Form -->
  <form action="{{ url_for('clientes.agregar') }}"
        method="post"
        class="bg-[#E2DACF] border border-[#CFC6B8]
               rounded-2xl shadow-md p-8 space-y-6">

    <!-- Nombre -->
    <div>
      <label class="block text-sm font-semibold text-[#1F1F1F] mb-1">
        Nombre *
      </label>
      <input type="text"
             name="nombre"
             required
             class="w-full px-4 py-3 rounded-lg border border-[#CFC6B8]
                    bg-[#F4EFE9]
                    focus:outline-none focus:ring-2 focus:ring-[#8B6B2E]">
    </div>

    <!-- Dirección -->
    <div>
      <label class="block text-sm font-semibold text-[#1F1F1F] mb-1">
        Dirección
      </label>
      <input type="text"
             name="direccion"
             class="w-full px-4 py-3 rounded-lg border border-[#CFC6B8]
                    bg-[#F4EFE9]
                    focus:outline-none focus:ring-2 focus:ring-[#8B6B2E]">
    </div>

    <!-- Teléfono -->
    <div>
      <label class="block text-sm font-semibold text-[#1F1F1F] mb-1">
        Teléfono *
      </label>
      <input type="text"
             name="telefono"
             required
             class="w-full px-4 py-3 rounded-lg border border-[#CFC6B8]
                    bg-[#F4EFE9]
                    focus:outline-none focus:ring-2 focus:ring-[#8B6B2E]">
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-semibold text-[#1F1F1F] mb-1">
        Email
      </label>
      <input type="email"
             name="email"
             class="w-full px-4 py-3 rounded-lg border border-[#CFC6B8]
                    bg-[#F4EFE9]
                    focus:outline-none focus:ring-2 focus:ring-[#8B6B2E]">
    </div>

    <!-- CUIT -->
    <div>
      <label class="block text-sm font-semibold text-[#1F1F1F] mb-1">
        CUIT
      </label>
      <input type="text"
             name="cuit"
             placeholder="XX-XXXXXXXX-X"
             class="w-full px-4 py-3 rounded-lg border border-[#CFC6B8]
                    bg-[#F4EFE9]
                    focus:outline-none focus:ring-2 focus:ring-[#8B6B2E]">
    </div>

    <!-- Activo -->
    <label class="flex items-center gap-2">
        <input type="checkbox" name="activo" checked>
        Cliente activo
        </label>

    <!-- Botones -->
    <div class="flex justify-end gap-4 pt-6">
      <a href="{{ url_for('clientes.index') }}"
         class="px-5 py-2 rounded-lg border border-[#CFC6B8]
                text-[#1F1F1F] font-semibold hover:bg-[#D8CFC2] transition">
        Cancelar
      </a>

      <button type="submit"
              class="px-6 py-2 rounded-lg bg-[#8B6B2E]
                     text-white font-semibold hover:bg-[#755824] transition">
        Guardar cliente
      </button>
    </div>

  </form>
</div>

{% endblock %}
