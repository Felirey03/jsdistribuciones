{% extends "base.html" %}
{% block content %}

<div class="max-w-5xl mx-auto mt-6">

  <!-- TÍTULO -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-[#1F1F1F]">
      Editar Remito #{{ remito.rid }}
    </h1>

    <a href="{{ url_for('remitos.ver', id=remito.rid) }}"
       class="text-[#8B6B2E] font-semibold hover:underline">
      ← Volver
    </a>
  </div>

  <form method="post" id="remito-form">

    <!-- DATOS GENERALES -->
    <div class="bg-[#E2DACF] border border-[#CFC6B8] rounded-2xl shadow-md p-6 mb-6">

      <div class="grid grid-cols-2 gap-6">

        <!-- FECHA -->
        <div>
          <label class="block text-sm font-semibold mb-1">Fecha</label>
          <input
            type="date"
            name="fecha"
            value="{{ remito.fecha }}"
            class="w-full px-3 py-2 rounded-lg border border-[#CFC6B8]
                   bg-[#F4EFE9] focus:outline-none
                   focus:ring-2 focus:ring-[#8B6B2E]"
          >
        </div>

        <!-- CLIENTE (solo lectura) -->
        <div>
          <label class="block text-sm font-semibold mb-1">Cliente</label>
          <input
            type="text"
            value="{{ remito.cliente.nombre }}"
            disabled
            class="w-full px-3 py-2 rounded-lg border border-[#CFC6B8]
                   bg-[#EFE9E1]"
          >
        </div>

        <!-- DIRECCIÓN -->
        <div class="col-span-2">
          <label class="block text-sm font-semibold mb-1">
            Dirección de entrega
          </label>
          <input
            type="text"
            name="direccion_entrega"
            value="{{ remito.direccion_entrega }}"
            class="w-full px-3 py-2 rounded-lg border border-[#CFC6B8]
                   bg-[#F4EFE9] focus:outline-none
                   focus:ring-2 focus:ring-[#8B6B2E]"
          >
        </div>

        <!-- OBSERVACIONES -->
        <div class="col-span-2">
          <label class="block text-sm font-semibold mb-1">
            Observaciones
          </label>
          <textarea
            name="observaciones"
            rows="3"
            class="w-full px-3 py-2 rounded-lg border border-[#CFC6B8]
                   bg-[#F4EFE9] focus:outline-none
                   focus:ring-2 focus:ring-[#8B6B2E]"
          >{{ remito.observaciones }}</textarea>
        </div>

      </div>
    </div>

    <!-- PRODUCTOS -->
    <div class="bg-[#E2DACF] border border-[#CFC6B8] rounded-2xl shadow-md p-6 mb-6">

      <h2 class="text-lg font-bold mb-4">
        Productos del remito
      </h2>

      <!-- SELECTOR -->
      <div class="flex gap-3 mb-4">
        <select
          id="producto-select"
          class="flex-1 px-3 py-2 rounded-lg border border-[#CFC6B8]
                 bg-[#F4EFE9] focus:outline-none
                 focus:ring-2 focus:ring-[#8B6B2E]"
        >
          <option value="">Seleccionar producto</option>
          {% for producto in productos %}
            <option value="{{ producto.pid }}"
                    data-stock="{{ producto.stock }}">
              {{ producto.nombre }} (Stock: {{ producto.stock }})
            </option>
          {% endfor %}
        </select>

        <input
          type="number"
          id="cantidad-input"
          min="1"
          placeholder="Cantidad"
          class="w-32 px-3 py-2 rounded-lg border border-[#CFC6B8]
                 bg-[#F4EFE9] focus:outline-none
                 focus:ring-2 focus:ring-[#8B6B2E]"
        >

        <button
          type="button"
          id="btn-agregar"
          onclick="agregarProducto()"
          class="bg-[#8B6B2E] text-white px-4 py-2 rounded-lg
                 font-semibold hover:bg-[#755824]"
        >
          Agregar
        </button>
        <p id="error-stock" class="text-red-600 text-sm hidden"></p>
      </div>

      <!-- LISTA -->
      <div class="border rounded-lg overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-[#D8CFC2]">
            <tr>
              <th class="px-3 py-2 text-left">Producto</th>
              <th class="px-3 py-2 text-left">Cantidad</th>
              <th class="px-3 py-2"></th>
            </tr>
          </thead>
          <tbody id="productos-lista" class="divide-y bg-[#F4EFE9]">
          </tbody>
        </table>
      </div>

    </div>

    <!-- INPUT OCULTO -->
    <input type="hidden" name="items_json" id="items-input">

    <!-- BOTÓN -->
    <div class="flex justify-end">
      <button
        type="submit"
        onclick="prepararEnvio()"
        class="bg-[#8B6B2E] text-white px-6 py-3 rounded-xl
               font-bold hover:bg-[#755824]"
      >
        Guardar cambios
      </button>
    </div>

  </form>
</div>

<!-- JS -->
<script>
let items = {{ items_json | tojson }};

const selectProducto = document.getElementById('producto-select')
const cantidadInput = document.getElementById('cantidad-input')
const btnAgregar = document.getElementById('btn-agregar')
const errorStock = document.getElementById('error-stock')
const tbody = document.getElementById('productos-lista')

function renderItems() {
  tbody.innerHTML = ''
  items.forEach((item, index) => {
    const tr = document.createElement('tr')
    tr.innerHTML = `
      <td class="px-3 py-2">${item.nombre}</td>
      <td class="px-3 py-2">
        <input type="number" min="1"
               value="${item.cantidad}"
               class="w-20 px-2 py-1 border rounded"
               onchange="items[${index}].cantidad = this.value">
      </td>
      <td class="px-3 py-2 text-right">
        <button type="button"
                class="text-red-600 font-semibold"
                onclick="items.splice(${index},1); renderItems()">
          Quitar
        </button>
      </td>
    `
    tbody.appendChild(tr)
  })
}

function validarStockActual() {
  const cantidad = parseInt(cantidadInput.value)
  if (!selectProducto.value || isNaN(cantidad)) {
    btnAgregar.disabled = false
    errorStock.classList.add('hidden')
    return
  }

  const stock = parseInt(
    selectProducto.options[selectProducto.selectedIndex].dataset.stock
  )

  if (cantidad > stock) {
    btnAgregar.disabled = true
    errorStock.textContent = `Stock insuficiente. Disponible: ${stock}`
    errorStock.classList.remove('hidden')
  } else {
    btnAgregar.disabled = false
    errorStock.classList.add('hidden')
  }
}

function agregarProducto() {
  const productoId = selectProducto.value
  const cantidad = parseInt(cantidadInput.value)
  if (!productoId || cantidad <= 0) return

  const nombre = selectProducto.options[selectProducto.selectedIndex].text

  items.push({
    producto_id: productoId,
    cantidad: cantidad,
    nombre: nombre
  })

  renderItems()
  selectProducto.value = ''
  cantidadInput.value = ''
}

function prepararEnvio() {
  document.getElementById('items-input').value = JSON.stringify(items)
}

cantidadInput.addEventListener('input', validarStockActual)
selectProducto.addEventListener('change', validarStockActual)

renderItems()
</script>

{% endblock %}
