<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSdistribuciones</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Flowbite -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <style>
@media print {

  @page {
    size: A4;
    margin: 10mm;
  }

  body {
    min-height: auto !important;
    background: white !important;
    color: black;
  }

  header,
  nav,
  button,
  a {
    display: none !important;
  }

  main {
    padding: 0 !important;
    margin: 0 !important;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    page-break-inside: avoid;
  }

  tr {
    page-break-inside: avoid;
    page-break-after: auto;
  }

  th, td {
    border: 1px solid #000;
    padding: 6px;
  }
}
</style>


</head>
<body body class="bg-[#F4F1EC] text-[#1F1F1F] min-h-screen">


   <header class="bg-[#E8E1D6] border-b border-[#D6CDBF] py-5 shadow-sm">
  <nav class="mx-auto max-w-4xl">
    <div class="grid grid-cols-5 items-center">

      <!-- Izquierda -->
      <div class="flex justify-end gap-6 col-span-2 text-xl font-semibold text-[#1F1F1F]">
        <a href="/" class="hover:text-[#C9A24D] transition">
          Inicio
        </a>
        <a href="/productos" class="hover:text-[#C9A24D] transition">
          Productos
        </a>
      </div>

      <!-- Logo -->
      <div class="flex justify-center">
        <img
          src="{{ url_for('static', filename='uploads/productos/logo.jpeg') }}"
          alt="JS Distribuciones"
          class="h-14"
        >
      </div>

      <!-- Derecha -->
      <div class="flex justify-start gap-6 col-span-2 text-xl font-semibold text-[#1F1F1F]">
        <a href="/clientes" class="hover:text-[#C9A24D] transition">
          Clientes
        </a>
        <a href="/remitos" class="hover:text-[#C9A24D] transition">
          Remitos
        </a>
      </div>

    </div>
  </nav>
</header>



    <!-- <header class="bg-blue-900 text-white p-4">
    <nav class="flex gap-6 text-lg">
        <a href="/">Inicio</a>
        <a href="/productos">Productos</a>
    </nav>
    </header> -->


    <main class="p-6">
      <main class="p-6">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="max-w-4xl mx-auto mb-6 space-y-3">
          {% for category, message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm font-medium
              {% if category == 'success' %} bg-green-200 text-green-900 {% endif %}
              {% if category == 'warning' %} bg-yellow-200 text-yellow-900 {% endif %}
              {% if category == 'error' %} bg-red-200 text-red-900 {% endif %}
            ">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}


    {% block content %}



    {% endblock %}
    </main>

    
</body>
</html>
